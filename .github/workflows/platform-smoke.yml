name: Platform smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  smoke:
    name: Lint, build & optional E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run smoke:ci
      - name: E2E reparo (se secrets configurados)
        if: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
        env:
          API_URL: ${{ secrets.SUPABASE_URL }}
          ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/repair-e2e.mjs
