appId: com.eversync.zllo
---
- runFlow: _helpers/open-dev-app.yaml
- tapOn: 'Já tenho conta'
- extendedWaitUntil:
    visible: 'Entrar'
    timeout: 10000
- tapOn: '🔑 Cliente Dev'
- extendedWaitUntil:
    visible: 'cliente@zllo.dev'
    timeout: 5000
- tapOn:
    id: login-password
- inputText: senha123
- hideKeyboard
- tapOn: 'Entrar'
- extendedWaitUntil:
    visible: 'Pedidos'
    timeout: 30000
